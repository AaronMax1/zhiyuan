<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>高考志愿助手</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <aside>
    <h1>高考志愿助手</h1>
    <form id="form">
      <label>考生生源地
        <select name="province">
          <option value="河北" selected>河北</option>
        </select>
      </label>
      <label>层次
        <select name="education_level">
          <option value="本科" selected>本科</option>
          <option value="专科">专科</option>
          <option value="">不限</option>
        </select>
      </label>
      <label>选科大类
        <select name="category">
          <option value="不限">全部科类（文科+理科/物理+历史）</option>
          <option value="理科" selected>理科大类（理科/物理类）</option>
          <option value="文科">文科大类（文科/历史类）</option>
        </select>
      </label>
      <label>分数<input name="score" value="655"></label>
      <label>位次<input name="rank" value="10500"></label>
      <label>核心诉求
        <select name="goal">
          <option value="就业优先" selected>就业优先</option>
          <option value="稳定/考公优先">稳定/考公优先</option>
          <option value="深造优先">继续深造优先</option>
          <option value="学校层次优先">学校层次优先</option>
          <option value="城市优先">城市优先</option>
        </select>
      </label>
      <div class="field-block">
        <label>专业偏好（可选，多选）</label>
        <p class="field-help">可跳过；也可以打开专业选择页，查看当前文/理科类下全部专业并和 AI 讨论方向。</p>
        <button type="button" id="open-major-page" class="secondary-button">打开专业选择页</button>
        <div id="selected-majors" class="selected-majors"></div>
      </div>
      <div class="field-block">
        <label>目标城市偏好（可选，多选）</label>
        <p class="field-help">可跳过；不选则不限制城市，由第 3 步结合院校、专业和位次统一筛选。</p>
        <div id="city-options" class="city-options"></div>
        <div id="selected-cities" class="selected-majors"></div>
      </div>
      <label>家庭资源<input name="family" placeholder="例如：普通家庭 / 父母在电力系统 / 医疗资源"></label>
      <label>限制条件<input name="constraints" placeholder="例如：色弱 / 不接受民办 / 不考虑中外合作 / 学费8000以内"></label>
      <label>最大志愿数<input name="max_slots" value="30"></label>
      <label>推荐引擎
        <select name="engine_mode">
          <option value="hebei" selected>河北专项库</option>
          <option value="advisor">gaokao-advisor 高级引擎</option>
        </select>
      </label>
      <button type="submit">生成方案</button>
      <a class="secondary-link" href="/data-query.html">打开数据库查询</a>
    </form>
    <section class="llm-config">
      <h2>AI 配置</h2>
      <label>Base URL<input id="llm-base-url" placeholder="在这里填写服务地址"></label>
      <label>Model<input id="llm-model" placeholder="在这里填写模型名称"></label>
      <label>Key<input id="llm-key" type="password" placeholder="只保存在当前浏览器"></label>
      <label>Timeout 秒<input id="llm-timeout" value="120"></label>
      <button type="button" id="save-llm">保存 AI 配置</button>
      <p class="muted">Base URL、Model、Key 只保存在浏览器 localStorage，请求时临时发送给后端，不写入代码或数据库。</p>
    </section>
    <div id="health"></div>
  </aside>
  <main>
    <section>
      <h2>六步进度</h2>
      <div id="steps" class="steps"></div>
      <div id="step-detail" class="step-detail"></div>
    </section>
  </main>
  <script src="/main.js"></script>
</body>
</html>
